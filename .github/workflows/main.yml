on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches all history

    - name: Force Full Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        # We drop the results filter and explicitly tell it NOT to require live verification
        extra_args: --only-verified=false
